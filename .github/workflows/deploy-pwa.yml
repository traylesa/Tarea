name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/movil/**'
      - 'src/shared/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare build directory
        run: |
          mkdir -p _site
          cp -r src/movil/* _site/
          mkdir -p _site/shared
          cp -r src/shared/* _site/shared/
          touch _site/.nojekyll

      - name: Fix shared path for Pages root
        run: sed -i 's|"\.\./shared/|"shared/|g' _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
